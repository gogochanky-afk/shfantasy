steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/shfantasy-frontend", "."]
    dir: "frontend"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/shfantasy-frontend"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - shfantasy-frontend
      - --image=gcr.io/$PROJECT_ID/shfantasy-frontend
      - --region=asia-east1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

images:
  - "gcr.io/$PROJECT_ID/shfantasy-frontend"